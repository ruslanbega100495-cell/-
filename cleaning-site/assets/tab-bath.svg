<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" fill="none">
  <defs>
    <filter id="sh" x="-60" y="-60" width="1520" height="1020" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#1B0A16" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF2FB3"/>
      <stop offset="1" stop-color="#FF79D6"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" rx="56" fill="#FFFFFF"/>
  <circle cx="1180" cy="230" r="200" fill="#FF2FB3" fill-opacity="0.10"/>
  <circle cx="300" cy="700" r="240" fill="#FF79D6" fill-opacity="0.10"/>

  <g filter="url(#sh)">
    <rect x="140" y="140" width="1120" height="620" rx="44" fill="#FFF3FA" stroke="#FF2FB3" stroke-opacity="0.16" stroke-width="10"/>

    <!-- mirror -->
    <rect x="250" y="240" width="320" height="200" rx="44" fill="#FFFFFF" stroke="#FF2FB3" stroke-opacity="0.18" stroke-width="10"/>
    <rect x="290" y="280" width="240" height="18" rx="9" fill="url(#p)" fill-opacity="0.28"/>
    <rect x="290" y="318" width="200" height="18" rx="9" fill="url(#p)" fill-opacity="0.22"/>

    <!-- sink -->
    <rect x="280" y="470" width="260" height="160" rx="44" fill="#FFFFFF" stroke="#FF2FB3" stroke-opacity="0.18" stroke-width="10"/>
    <rect x="310" y="510" width="200" height="70" rx="26" fill="#FFF3FA" stroke="#FF79D6" stroke-opacity="0.30" stroke-width="10"/>
    <path d="M410 462c0-34 30-56 64-56" stroke="#FF2FB3" stroke-opacity="0.55" stroke-width="12" stroke-linecap="round"/>
    <path d="M468 406h70" stroke="#FF2FB3" stroke-opacity="0.55" stroke-width="12" stroke-linecap="round"/>

    <!-- shower / tiles -->
    <rect x="660" y="230" width="500" height="420" rx="44" fill="#FFFFFF" stroke="#FF2FB3" stroke-opacity="0.18" stroke-width="10"/>
    <path d="M710 280H1110" stroke="#FF2FB3" stroke-opacity="0.10" stroke-width="12" stroke-linecap="round"/>
    <path d="M710 340H1110" stroke="#FF2FB3" stroke-opacity="0.08" stroke-width="12" stroke-linecap="round"/>
    <path d="M710 400H1110" stroke="#FF2FB3" stroke-opacity="0.06" stroke-width="12" stroke-linecap="round"/>
    <path d="M740 500h220" stroke="#FF79D6" stroke-opacity="0.26" stroke-width="18" stroke-linecap="round"/>

    <!-- sparkles -->
    <path d="M610 250l14 30 30 14-30 14-14 30-14-30-30-14 30-14 14-30z" fill="url(#p)" opacity="0.92"/>
    <path d="M1120 700l10 22 22 10-22 10-10 22-10-22-22-10 22-10 10-22z" fill="#FF79D6" opacity="0.9"/>
  </g>
</svg>

