<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" fill="none">
  <defs>
    <filter id="shadow" x="-50" y="-50" width="1500" height="1000" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1B0A16" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FF2FB3"/>
      <stop offset="1" stop-color="#FF79D6"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" rx="56" fill="#FFFFFF"/>

  <g filter="url(#shadow)">
    <rect x="90" y="90" width="1220" height="720" rx="44" fill="#FFF3FA" stroke="#FF2FB3" stroke-opacity="0.18" stroke-width="10"/>

    <!-- left (before) -->
    <clipPath id="clipL">
      <rect x="120" y="120" width="590" height="660" rx="34"/>
    </clipPath>
    <g clip-path="url(#clipL)">
      <rect x="120" y="120" width="590" height="660" fill="#F7D7EA"/>
      <rect x="160" y="170" width="520" height="52" rx="26" fill="#1C0B16" fill-opacity="0.12"/>
      <rect x="160" y="248" width="360" height="22" rx="11" fill="#1C0B16" fill-opacity="0.10"/>
      <rect x="160" y="284" width="410" height="22" rx="11" fill="#1C0B16" fill-opacity="0.09"/>
      <path d="M210 520c80-55 150 75 230 18 70-50 120 10 170-20" stroke="#1C0B16" stroke-opacity="0.16" stroke-width="18" stroke-linecap="round"/>
      <path d="M210 590c92-65 160 86 248 22 70-52 118 6 170-24" stroke="#1C0B16" stroke-opacity="0.14" stroke-width="16" stroke-linecap="round"/>
      <circle cx="220" cy="430" r="24" fill="#1C0B16" fill-opacity="0.12"/>
      <circle cx="280" cy="448" r="34" fill="#1C0B16" fill-opacity="0.10"/>
      <circle cx="360" cy="430" r="28" fill="#1C0B16" fill-opacity="0.09"/>
      <rect x="160" y="700" width="170" height="48" rx="24" fill="#1C0B16" fill-opacity="0.10"/>
    </g>

    <!-- right (after) -->
    <clipPath id="clipR">
      <rect x="690" y="120" width="590" height="660" rx="34"/>
    </clipPath>
    <g clip-path="url(#clipR)">
      <rect x="690" y="120" width="590" height="660" fill="#FFFFFF"/>
      <rect x="730" y="170" width="520" height="52" rx="26" fill="#FF2FB3" fill-opacity="0.14"/>
      <rect x="730" y="248" width="360" height="22" rx="11" fill="#1C0B16" fill-opacity="0.08"/>
      <rect x="730" y="284" width="410" height="22" rx="11" fill="#1C0B16" fill-opacity="0.06"/>

      <!-- sparkle lines -->
      <path d="M760 520H1220" stroke="#FF2FB3" stroke-opacity="0.18" stroke-width="12" stroke-linecap="round"/>
      <path d="M760 564H1160" stroke="#FF2FB3" stroke-opacity="0.14" stroke-width="12" stroke-linecap="round"/>
      <path d="M760 608H1120" stroke="#FF2FB3" stroke-opacity="0.12" stroke-width="12" stroke-linecap="round"/>

      <!-- sparkles -->
      <path d="M1048 408l14 30 30 14-30 14-14 30-14-30-30-14 30-14 14-30z" fill="url(#pink)"/>
      <path d="M1180 650l10 22 22 10-22 10-10 22-10-22-22-10 22-10 10-22z" fill="#FF79D6"/>
      <rect x="730" y="700" width="210" height="48" rx="24" fill="url(#pink)"/>
    </g>

    <!-- separator -->
    <rect x="680" y="120" width="20" height="660" rx="10" fill="url(#pink)"/>
    <circle cx="690" cy="450" r="34" fill="#FFFFFF" stroke="#FF2FB3" stroke-opacity="0.30" stroke-width="10"/>
    <path d="M684 450l-10-10v20l10-10z" fill="#FF2FB3"/>
    <path d="M696 450l10-10v20l-10-10z" fill="#FF2FB3"/>
  </g>

  <!-- labels -->
  <g filter="url(#shadow)">
    <rect x="140" y="142" width="120" height="44" rx="22" fill="#1C0B16" fill-opacity="0.82"/>
    <rect x="1160" y="142" width="120" height="44" rx="22" fill="#FF2FB3"/>
  </g>
</svg>

